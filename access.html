<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Access &middot; DonutSMP Stats</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/theme.css" />
<style>
  :root{ --ac:#5bd99a; }
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:64px 22px 60px}
  h1{font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:12px;justify-content:center;filter:drop-shadow(0 0 22px rgba(255,255,255,.13))}
  h1 .grad{background:linear-gradient(105deg,#ffffff 0%,#d7dae6 28%,#9197b0 50%,#d7dae6 72%,#ffffff 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 5s ease-in-out infinite alternate}
  .sub{color:var(--muted);font-size:14.5px;margin-top:10px;text-align:center;line-height:1.55}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px 24px;margin-top:28px}
  .msg{color:var(--muted);font-size:14px;padding:26px 0;text-align:center}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--ac);border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite}
  .btn{background:var(--ac);color:#08120c;border:none;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:.12s;font-family:inherit}
  .btn:hover{filter:brightness(1.06)} .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn.ghost:hover{border-color:rgba(255,255,255,.28);filter:none}
  label{display:block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 7px}
  input{width:100%;background:#0c0c12;border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
  input:focus{border-color:var(--ac)}
  .pill{display:inline-block;background:#0c0c12;border:1px solid var(--border);border-radius:9px;padding:4px 10px;color:#e6e6f0;font-family:"Consolas",ui-monospace,monospace;font-size:14px}
  .price{font-weight:700;color:var(--ac)}
  .step{margin-bottom:20px} .row{display:flex;gap:10px;margin-top:9px}
  .note{color:var(--muted);font-size:13.5px;line-height:1.6;margin-top:8px}
  .err{color:#ff8a8a;font-size:13.5px;margin-top:8px;min-height:18px}
  .ok{color:var(--ac);font-size:14px;font-weight:700}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;margin:24px 0;text-transform:uppercase;letter-spacing:1.5px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .granted{text-align:center;padding:6px 0}
  .check{width:52px;height:52px;border-radius:50%;background:rgba(91,217,154,.12);border:1px solid rgba(91,217,154,.35);display:flex;align-items:center;justify-content:center;margin:0 auto}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <h1>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5bd99a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="grad">Access</span>
    </h1>
    <p class="sub">This site requires access. Pay in Minecraft to unlock it.</p>
    <div id="app" class="card"><div class="msg"><div class="spinner"></div>Loading&hellip;</div></div>
  </div>
<script>
  var API='/api/access', KEY='acToken';
  var app=document.getElementById('app');
  function mk(){ var a='abcdefghijklmnopqrstuvwxyz0123456789', s=''; for(var i=0;i<24;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }
  function token(){ var t=localStorage.getItem(KEY); if(!t){ t=mk(); localStorage.setItem(KEY,t); } return t; }
  function abbr(n){ n=+n; if(n>=1e12)return (n/1e12)+'T'; if(n>=1e9)return (n/1e9)+'B'; if(n>=1e6)return (n/1e6)+'M'; if(n>=1e3)return (n/1e3)+'k'; return String(n); }
  function num(n){ return Math.round(+n).toLocaleString('en-US'); }
  function fmtDate(ms){ try{ return new Date(ms).toLocaleDateString('en-US',{day:'2-digit',month:'2-digit',year:'numeric'}); }catch(e){ return ''; } }
  var TK=token();

  function renderGranted(j){
    var friend=j.friend?' (friend access)':'';
    app.innerHTML='<div class="granted">'+
      '<div class="check"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#5bd99a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>'+
      '<p class="ok" style="margin-top:14px;font-size:16px">You have access'+friend+'.</p>'+
      '<p class="note" style="margin-top:4px">'+(j.already?'Code already redeemed \u2014 you already have access.':(j.friend?'Unlocked permanently.':'Valid until <b>'+fmtDate(j.expires)+'</b>.'))+'</p>'+
      '<div class="row" style="justify-content:center;margin-top:18px"><a class="btn" href="index.html">Go to the site &rarr;</a></div></div>';
  }

  function renderUnlock(cfg){
    app.innerHTML=
      '<div id="offbanner"></div>'+
      '<div class="step"><label>Your Minecraft name</label>'+
        '<div class="row"><input id="ign" placeholder="Minecraft name" autocomplete="off"></div></div>'+
      '<div class="step" id="paystep"><label>Option 1 &middot; Pay in Minecraft</label>'+
        '<div class="note">Pay <span class="price">'+abbr(cfg.price)+'</span> ('+num(cfg.price)+' $) to <span class="pill">'+cfg.collector+'</span> for <b>'+cfg.durationDays+' days</b> of access:</div>'+
        '<div class="row"><span class="pill" style="font-size:15px">/pay '+cfg.collector+' '+cfg.price+'</span></div></div>'+
      '<div class="step">'+
        '<div class="note">Once you have paid with the name above, click:</div>'+
        '<div class="row"><button class="btn" id="claim">I paid &mdash; unlock</button></div>'+
        '<div class="err" id="err1"></div></div>'+
      '<div class="divider">or</div>'+
      '<div class="step" style="margin-bottom:0"><label>Option 2 &middot; Friend code</label>'+
        '<div class="row"><input id="code" placeholder="Code" autocomplete="off"><button class="btn ghost" id="redeem">Use code</button></div>'+
        '<div class="err" id="err2"></div></div>';

    var offb=document.getElementById('offbanner');
    async function checkOnline(){
      var ps=document.getElementById('paystep');
      try {
        var r=await fetch(API+'?online=1'); var j=await r.json();
        if(j && j.online===false){
          offb.innerHTML='<div style="background:rgba(255,90,90,.10);border:1px solid rgba(255,90,90,.4);color:#ff9b9b;border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:13.5px;line-height:1.55"><b>Do not pay right now.</b><br>'+(j.collector||'The account')+' is offline and cannot process payments. Wait until they are back online &mdash; otherwise your payment cannot be matched to you.</div>';
          if(ps) ps.style.display='none';
        } else {
          offb.innerHTML=''; if(ps) ps.style.display='';
        }
      } catch(e){ offb.innerHTML=''; if(ps) ps.style.display=''; }
    }
    checkOnline();

    var claimBtn=document.getElementById('claim'), ignEl=document.getElementById('ign'), err1=document.getElementById('err1');
    var tries=0, polling=null;
    async function tryClaim(auto){
      var ign=ignEl.value.trim(); if(!ign){ err1.textContent='Please enter a name.'; return; }
      claimBtn.disabled=true; if(!auto) err1.textContent='';
      try{
        var r=await fetch(API+'?claim=1',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ign:ign,token:TK})});
        var j=await r.json();
        if(j.access){ if(polling){clearInterval(polling);polling=null;} renderGranted(j); return; }
        if(j.error==='claimed'){ err1.textContent='This name is already linked to another device.'; if(polling){clearInterval(polling);polling=null;} }
        else { err1.textContent='No valid payment found for "'+ign+'" yet. Pay first &mdash; I keep checking automatically…'; if(!polling){ polling=setInterval(function(){ tries++; if(tries>40){clearInterval(polling);polling=null;} tryClaim(true); },5000); } }
      }catch(e){ err1.textContent='Error: '+e.message; }
      finally{ claimBtn.disabled=false; }
    }
    claimBtn.addEventListener('click',function(){ tries=0; checkOnline(); tryClaim(false); });
    ignEl.addEventListener('keydown',function(e){ if(e.key==='Enter'){ tries=0; tryClaim(false); } });

    var redeemBtn=document.getElementById('redeem'), codeEl=document.getElementById('code'), err2=document.getElementById('err2');
    async function tryRedeem(){
      var code=codeEl.value.trim(); if(!code){ err2.textContent='Please enter a code.'; return; }
      var _ign=(document.getElementById('ign')&&document.getElementById('ign').value.trim())||''; if(!_ign){ err2.textContent='Please enter your Minecraft name above first.'; return; }
      redeemBtn.disabled=true; err2.textContent='';
      try{
        var r=await fetch(API+'?redeem=1',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,token:TK,ign:_ign})});
        var j=await r.json();
        if(j.access){ try{ if(_ign) localStorage.setItem('donutIgn',_ign); }catch(e){} renderGranted(j); } else err2.textContent = (j.error==='code-full') ? 'This code has already been used.' : 'Invalid code.';
      }catch(e){ err2.textContent='Error: '+e.message; }
      finally{ redeemBtn.disabled=false; }
    }
    redeemBtn.addEventListener('click',tryRedeem);
    codeEl.addEventListener('keydown',function(e){ if(e.key==='Enter') tryRedeem(); });
  }

  (async function(){
    try{
      var r=await fetch(API+'?check=1&token='+encodeURIComponent(TK)); var j=await r.json();
      if(j.access){ renderGranted(j); return; }
      var cr=await fetch(API+'?config=1'); var cfg=await cr.json();
      renderUnlock(cfg);
    }catch(e){ app.innerHTML='<div class="msg">Could not load: '+e.message+'</div>'; }
  })();
</script>
</body>
</html>
