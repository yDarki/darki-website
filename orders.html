<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orders</title>
<style>
  :root{ --bg:#0a0a0f; --card:#15151f; --card-2:#1b1b28; --text:#f2f2f7; --muted:#8c8ca3; --accent:#5bd99a; --accent-2:#7b5bff; --border:rgba(255,255,255,.08); }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(700px circle at 22% 18%, rgba(91,217,154,.12), transparent 42%),radial-gradient(700px circle at 82% 80%, rgba(123,91,255,.13), transparent 45%);}
  .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:28px 22px 60px}
  .back{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 16px;color:var(--muted);font-weight:600;font-size:14px;margin-bottom:22px;transition:.2s}
  .back:hover{color:var(--text);border-color:var(--accent);background:var(--card-2)}
  h1{font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-1px}
  h1 .grad{background:linear-gradient(120deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--muted);font-size:15px;margin-top:8px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:26px 0 14px}
  .search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;outline:none}
  .search:focus{border-color:var(--accent)}
  .btn{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#06160e;border:none;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;transition:.12s}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .msg{color:var(--muted);font-size:14px;padding:34px 0;text-align:center}
  .err{color:#ff6b6b}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .order{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .order img{width:30px;height:30px;image-rendering:pixelated;flex-shrink:0}
  .order .info{flex:1;min-width:0}
  .order .nm{font-weight:700;text-transform:capitalize}
  .order .meta{color:var(--muted);font-size:13px;margin-top:2px}
  .order .pr{text-align:right;flex-shrink:0}
  .order .pr .v{font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .order .pr .s{color:var(--muted);font-size:12px;margin-top:2px}
  .attrib{margin-top:18px;font-size:13px;color:var(--muted)} .attrib a{color:var(--accent);font-weight:600}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <a class="back" href="index.html">← Dashboard</a>
    <h1>📦 <span class="grad">Buy Orders</span></h1>
    <p class="sub">Such ein Item und sieh die offenen Kauf-Orders (was Spieler dafür zahlen wollen).</p>
    <div class="toolbar">
      <input class="search" id="q" placeholder="Item suchen… (z. B. netherite ingot)" />
      <button class="btn" id="go">Suchen</button>
    </div>
    <div id="out"><div class="msg">Gib oben ein Item ein, um die Orders zu sehen.</div></div>
    <p class="attrib">Order-Daten von <a href="https://donut.auction" target="_blank" rel="noopener">donut.auction</a>. Hinweis: Der Order-Book ist oft leer, wenn gerade niemand Kauf-Orders offen hat.</p>
  </div>
  <script>
    const API='/api/orders';
    const TEX='https://donutsmp.stacksail.com/textures/';
    const qEl=document.getElementById('q'), goEl=document.getElementById('go'), out=document.getElementById('out');
    const de=n=>(n==null?'–':Math.round(n).toLocaleString('de-DE'));
    const shortId=id=>(id||'').replace(/^minecraft:/,'');
    const pretty=id=>shortId(id).replace(/_/g,' ');
    const tex=id=>TEX+shortId(id)+'.png';
    function ago(iso){ if(!iso) return ''; const t=Date.parse(iso); if(isNaN(t)) return ''; const s=Math.floor((t-Date.now())/1000); const a=Math.abs(s); const d=Math.floor(a/86400),h=Math.floor((a%86400)/3600),m=Math.floor((a%3600)/60); const txt=d>0?(d+'d '+h+'h'):(h>0?(h+'h '+m+'m'):(m+'m')); return s>=0?('läuft ab in '+txt):('abgelaufen vor '+txt); }
    async function search(){
      const q=qEl.value.trim(); if(!q) return;
      out.innerHTML='<div class="msg"><div class="spinner"></div>Suche Orders…</div>'; goEl.disabled=true;
      try{
        const r=await fetch(API+'?q='+encodeURIComponent(q)); const j=await r.json();
        if(j.error) throw new Error(j.error);
        let orders=(j.orders||[]).slice();
        const priceOf=o=>(o.itemPrice!=null?o.itemPrice:(o.price!=null?o.price:o.pricePerItem));
        orders.sort((a,b)=>(priceOf(b)||0)-(priceOf(a)||0));
        if(!orders.length){ out.innerHTML='<div class="msg">Keine offenen Orders für „'+q+'". (Der Order-Book ist aktuell leer.)</div>'; return; }
        let h='';
        orders.slice(0,100).forEach(o=>{
          const it=o.item||{};
          const id=it.itemId||it.id||q;
          const price=priceOf(o);
          const ordered=(o.amountOrdered!=null?o.amountOrdered:o.amount);
          const delivered=(o.amountDelivered!=null?o.amountDelivered:0);
          const remaining=(ordered!=null)?(ordered-delivered):null;
          const buyer=o.userName||o.user||o.buyer||'?';
          const ench=((it.enchantments||[]).map(e=>(e.name||'')+(e.level?(' '+e.level):'')).filter(Boolean).join(', '));
          const exp=ago(o.expirationDate||o.expiresAt);
          h+='<div class="order"><img src="'+tex(id)+'" onerror="this.style.visibility=&#39;hidden&#39;">'
            +'<div class="info"><div class="nm">'+pretty(id)+(ench?(' <span style=\'color:var(--accent-2);font-size:12px\'>('+ench+')</span>'):'')+'</div>'
            +'<div class="meta">'+buyer+(remaining!=null?(' · '+de(remaining)+' von '+de(ordered)+' offen'):'')+(exp?(' · '+exp):'')+'</div></div>'
            +'<div class="pr"><div class="v">'+de(price)+'</div><div class="s">pro Stück</div></div></div>';
        });
        out.innerHTML=h;
      }catch(e){ out.innerHTML='<div class="msg err">Fehler: '+e.message+'</div>'; }
      finally{ goEl.disabled=false; }
    }
    goEl.addEventListener('click',search);
    qEl.addEventListener('keydown',e=>{ if(e.key==='Enter') search(); });
  </script>
</body>
</html>
