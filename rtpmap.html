<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RTP Map</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/theme.css?v=3">
  <style>
    .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:28px 22px 70px}
    .back{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 16px;color:var(--muted);font-weight:600;font-size:14px;margin-bottom:22px;transition:.2s}
    .back:hover{color:var(--text);border-color:rgba(255,255,255,.4)}
    h1{font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-1px;filter:drop-shadow(0 0 22px rgba(255,255,255,.13))}
    h1 .grad{background:linear-gradient(105deg,#ffffff 0%,#d7dae6 28%,#9197b0 50%,#d7dae6 72%,#ffffff 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 5s ease-in-out infinite alternate}
    .sub{color:var(--muted);font-size:15px;margin-top:8px;line-height:1.5;max-width:560px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:22px}
    .dims{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .dims button{font-size:13px;padding:7px 15px}
    .bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
    .stat{font-size:13px;color:var(--muted)}
    .stat b{color:var(--text);font-variant-numeric:tabular-nums}
    .btn{margin-left:auto;background:#fff;color:#0a0a0c;border:none;padding:9px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
    .btn:hover{transform:translateY(-2px)}
    .mapwrap{position:relative;width:100%;aspect-ratio:1/1;background:var(--card-2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .mapwrap svg{display:block;width:100%;height:100%}
    .mapouter{position:relative;padding:22px 24px}
    .axl{position:absolute;color:rgba(255,255,255,.72);font-size:15px;font-weight:700;pointer-events:none;font-variant-numeric:tabular-nums}
    .axl-xt{top:0;left:50%;transform:translateX(-50%)}
    .axl-xb{bottom:0;left:50%;transform:translateX(-50%)}
    .axl-zl{left:2px;top:50%;transform:translateY(-50%)}
    .axl-zr{right:2px;top:50%;transform:translateY(-50%)}
    .detail{position:absolute;z-index:8;background:#0a0a0c;border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:10px 26px 11px 12px;font-size:12.5px;color:var(--text);white-space:nowrap;box-shadow:0 8px 26px rgba(0,0,0,.5);display:none;font-variant-numeric:tabular-nums}
    .detail.show{display:block}
    .detail .dsep{height:1px;background:rgba(255,255,255,.12);margin:7px 0}
    .detail .dnear{color:var(--muted)}
    .detail .dnear b{color:var(--text)}
    .detail .dclose{position:absolute;top:3px;right:5px;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:2px}
    .detail .dclose:hover{color:var(--text)}
    .tip{position:absolute;pointer-events:none;background:#0a0a0c;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:6px 9px;font-size:12px;color:var(--text);opacity:0;transform:translate(-50%,-130%);transition:opacity .12s;white-space:nowrap;z-index:5;font-variant-numeric:tabular-nums}
    .tip b{color:var(--text)}
    .tip .rg{font-weight:700}
    .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:14px;padding:30px}
    .legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px}
    .legend .it{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
    .legend .sw{width:11px;height:11px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.35)}
    .note{color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:12px}
    @keyframes btnflash{from{box-shadow:0 0 0 0 rgba(255,255,255,.55)}to{box-shadow:0 0 0 9px rgba(255,255,255,0)}}
    .btn.flash{animation:btnflash .5s ease-out}
    .iconbtn{background:#1a1a28;border:1px solid rgba(255,255,255,.10);color:#b8bccc;width:34px;height:34px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
    .iconbtn:hover{color:#fff;border-color:rgba(255,255,255,.32)}
    .ovlbig{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:28px;background:rgba(6,6,10,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}
    .ovlbig.open{opacity:1;pointer-events:auto}
    .ovlbig-card{width:min(1080px,96vw);background:#0b0b12;border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:24px;position:relative}
    .ovlbig-x{position:absolute;top:14px;right:14px;background:none;border:1px solid rgba(255,255,255,.14);color:#8b8ba0;width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:18px;z-index:2}
    .ovlbig-x:hover{color:#fff;border-color:#fff}
    .ovlbig-title{font-size:19px;font-weight:800;color:#f3f3f7}
    .ovlbig-sub{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#8b8ba0;font-weight:700;margin:4px 0 14px}
    .mapbig-outer{width:min(78vh,820px);max-width:100%;margin:0 auto}
  .coordfind{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px}
    .coordfind .cf-lbl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700}
    .coordfind label{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);font-weight:600}
    .coordfind input{width:96px;background:#1a1a28;border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:8px;padding:6px 9px;font-size:13px;font-variant-numeric:tabular-nums}
    .coordfind input:focus{outline:none;border-color:rgba(255,255,255,.35)}
    .cf-out{font-size:12.5px;color:var(--text);font-variant-numeric:tabular-nums}
    .cf-out b{color:var(--text)}
    .cf-muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <a class="back" href="/index.html">← Dashboard</a>
    <h1><span class="grad">RTP Map</span></h1>
    <p class="sub">Where players land when they /rtp on DonutSMP — one point per teleport. Pick a dimension; Overworld points are coloured by region (Miep's map).</p>
    <div class="panel">
      <div class="dims" id="dims">
        <button type="button" data-d="overworld" class="seg on">Overworld</button>
        <button type="button" data-d="nether" class="seg">Nether</button>
        <button type="button" data-d="end" class="seg">End</button>
      </div>
      <div class="bar">
        <div class="stat"><b id="count">–</b> points</div>
        <div class="stat" id="updated"></div>
        <button class="btn ghost" id="refresh">Refresh</button>
        <button class="seg" id="tiles" type="button">Region tiles</button>
        <button class="iconbtn" id="mapEnlarge" title="Enlarge" aria-label="Enlarge map"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
      </div>
      <div class="mapouter" id="mapouter">
        <div class="axl axl-xt">+X</div>
        <div class="axl axl-xb">-X</div>
        <div class="axl axl-zl">-Z</div>
        <div class="axl axl-zr">+Z</div>
        <div class="mapwrap" id="mapwrap">
          <div class="empty" id="empty">Loading…</div>
        </div>
        <div class="tip" id="tip"></div>
        <div class="detail" id="detail"></div>
      </div>
      <div class="coordfind">
        <span class="cf-lbl">Your coords</span>
        <label>X <input id="cfX" type="number" inputmode="numeric" placeholder="X"></label>
        <label>Z <input id="cfZ" type="number" inputmode="numeric" placeholder="Z"></label>
        <button class="btn ghost" id="cfBtn" type="button">Find nearest</button>
        <span class="cf-out" id="cfOut"></span>
      </div>
      <div class="legend" id="legend"></div>
      <p class="note" id="bordernote"></p>
    </div>
  </div>

  <div class="ovlbig" id="mapBig"><div class="ovlbig-card">
    <button class="ovlbig-x" id="mapBigX">&times;</button>
    <div class="ovlbig-title">RTP Map</div>
    <div class="ovlbig-sub" id="mapBigSub"></div>
    <div class="mapouter mapbig-outer" id="mapBigOuter">
      <div class="axl axl-xt">+X</div>
      <div class="axl axl-xb">-X</div>
      <div class="axl axl-zl">-Z</div>
      <div class="axl axl-zr">+Z</div>
      <div class="mapwrap" id="mapBigWrap"></div>
      <div class="tip" id="mapBigTip"></div>
      <div class="detail" id="mapBigDetail"></div>
    </div>
  </div></div>

  <script>
  (function(){
    var mapwrap=document.getElementById('mapwrap');
    var emptyEl=document.getElementById('empty');
    var tip=document.getElementById('tip');
    var countEl=document.getElementById('count');
    var updatedEl=document.getElementById('updated');
    var noteEl=document.getElementById('bordernote');
    var legendEl=document.getElementById('legend');
    var refreshBtn=document.getElementById('refresh');
    var dimsEl=document.getElementById('dims');
    var mapouter=document.getElementById('mapouter');
    var detail=document.getElementById('detail');
    var tilesBtn=document.getElementById('tiles');
    var showTiles=(function(){ try{ return localStorage.getItem('rtpTiles')==='1'; }catch(e){ return false; } })();
    var screenPts=[];
    var S=1000;
    var lastData=null;

    function loadDim(){ try{ var d=localStorage.getItem('rtpDim'); return (d==='nether'||d==='end')?d:'overworld'; }catch(e){ return 'overworld'; } }
    function saveDim(d){ try{ localStorage.setItem('rtpDim', d); }catch(e){} }
    var curDim=loadDim();
    var DIMCOLOR={ nether:'#ff6b4a', end:'#c084fc' };
    var DIMLABEL={ overworld:'Overworld', nether:'Nether', end:'End' };

    var CELL=50000, ORIGIN=-225000, NCELL=9, EXTENT=CELL*NCELL;
    var REGIONS=[
      {name:'Oceania',    color:'#a855f7'},
      {name:'NA West',    color:'#f97316'},
      {name:'NA East',    color:'#ef4444'},
      {name:'EU West',    color:'#22d3ee'},
      {name:'EU Central', color:'#3b82f6'},
      {name:'Asia',       color:'#eab308'}
    ];
    var GRID=["011122222","011122222","011122222","000122222","505522222","533444442","533444444","434444444","433333334"];
    function clampCell(v){ v=Math.floor((v-ORIGIN)/CELL); return v<0?0:(v>8?8:v); }
    function regionCode(x,z){ return parseInt(GRID[clampCell(z)].charAt(clampCell(x)),10); }

    function clampS(v){ return v<0?0:(v>S?S:v); }
    function ago(t){ var s=Math.floor((Date.now()-t)/1000); if(s<60)return s+'s ago'; var m=Math.floor(s/60); if(m<60)return m+'m ago'; var h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }
    function fmt(n){ return Math.round(n).toLocaleString('en-US'); }
    function setSvg(svg){ var old=mapwrap.querySelector('svg'); if(old) old.remove(); if(svg) mapwrap.insertAdjacentHTML('afterbegin', svg); }
    function pdim(p){ var d=(p&&p.d)||'overworld'; return (d==='nether'||d==='end')?d:'overworld'; }
    function frame(){ return '<rect x="1.5" y="1.5" width="'+(S-3)+'" height="'+(S-3)+'" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="2.5"/>'; }

    function drawOverworld(points){
      function sx(z){ return (z-ORIGIN)/EXTENT*S; }
      function sy(x){ return (ORIGIN+EXTENT-x)/EXTENT*S; }
      var g='';
      if(showTiles){
        var cw=CELL/EXTENT*S;
        for(var zc=0;zc<NCELL;zc++){ for(var xc=0;xc<NCELL;xc++){ var rcode=parseInt(GRID[zc].charAt(xc),10); g+='<rect x="'+sx(ORIGIN+zc*CELL).toFixed(1)+'" y="'+sy(ORIGIN+(xc+1)*CELL).toFixed(1)+'" width="'+cw.toFixed(1)+'" height="'+cw.toFixed(1)+'" fill="'+REGIONS[rcode].color+'" opacity="0.16"/>'; } }
      }
      for(var i=1;i<NCELL;i++){
        var v=sx(ORIGIN+i*CELL).toFixed(1);
        g+='<line x1="'+v+'" y1="0" x2="'+v+'" y2="'+S+'" stroke="rgba(255,255,255,.10)"/>';
        var w=sy(ORIGIN+i*CELL).toFixed(1);
        g+='<line x1="0" y1="'+w+'" x2="'+S+'" y2="'+w+'" stroke="rgba(255,255,255,.10)"/>';
      }
      var c0=sx(0).toFixed(1), c1=sy(0).toFixed(1);
      g+='<line x1="'+c0+'" y1="0" x2="'+c0+'" y2="'+S+'" stroke="rgba(255,255,255,.34)" stroke-width="2" stroke-dasharray="6 6"/><line x1="0" y1="'+c1+'" x2="'+S+'" y2="'+c1+'" stroke="rgba(255,255,255,.34)" stroke-width="2" stroke-dasharray="6 6"/>';
      g+=frame();
      screenPts=[];
      var pts='';
      points.forEach(function(p){
        var psx=clampS(sx(p.z)), psy=clampS(sy(p.x));
        var code=regionCode(p.x,p.z);
        screenPts.push({sx:psx,sy:psy,p:p,code:code});
        pts+='<circle cx="'+psx.toFixed(1)+'" cy="'+psy.toFixed(1)+'" r="4.2" fill="'+REGIONS[code].color+'" stroke="rgba(0,0,0,.4)" stroke-width="0.8" opacity="0.92"/>';
      });
      setSvg('<svg viewBox="0 0 '+S+' '+S+'" xmlns="http://www.w3.org/2000/svg">'+g+pts+'</svg>');
      var rcnt=[0,0,0,0,0,0]; screenPts.forEach(function(s){ if(s.code>=0&&s.code<6) rcnt[s.code]++; }); legendEl.innerHTML=REGIONS.map(function(r,i){ return '<span class="it"><span class="sw" style="background:'+r.color+'"></span>'+r.name+' ('+rcnt[i]+')</span>'; }).join('');
      noteEl.textContent='Overworld — framed to the ±225k region area; regions from the Miep / StackingDev DonutSMP map. Axis: X vertical (+X top), Z horizontal (+Z right).';
    }

    function drawPlain(points, dim){
      var col=DIMCOLOR[dim]||'#8bd0ff';
      var minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
      points.forEach(function(p){ if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x; if(p.z<minZ)minZ=p.z; if(p.z>maxZ)maxZ=p.z; });
      if(!isFinite(minX)){ minX=-1000;maxX=1000;minZ=-1000;maxZ=1000; }
      var cxw=(minX+maxX)/2, czw=(minZ+maxZ)/2;
      var half=Math.max((maxX-minX),(maxZ-minZ))/2;
      half=Math.max(half*1.15, 500);
      var x0=cxw-half, x1=cxw+half, z0=czw-half, z1=czw+half;
      function sx(z){ return (z-z0)/(z1-z0)*S; }
      function sy(x){ return (x1-x)/(x1-x0)*S; }
      var g='';
      for(var i=1;i<4;i++){ var v=(i/4*S).toFixed(1); g+='<line x1="'+v+'" y1="0" x2="'+v+'" y2="'+S+'" stroke="rgba(255,255,255,.08)"/><line x1="0" y1="'+v+'" x2="'+S+'" y2="'+v+'" stroke="rgba(255,255,255,.08)"/>'; }
      if(0>=z0 && 0<=z1){ var cz=sx(0).toFixed(1); g+='<line x1="'+cz+'" y1="0" x2="'+cz+'" y2="'+S+'" stroke="rgba(255,255,255,.34)" stroke-width="2" stroke-dasharray="6 6"/>'; }
      if(0>=x0 && 0<=x1){ var cx=sy(0).toFixed(1); g+='<line x1="0" y1="'+cx+'" x2="'+S+'" y2="'+cx+'" stroke="rgba(255,255,255,.34)" stroke-width="2" stroke-dasharray="6 6"/>'; }
      g+=frame();
      screenPts=[];
      var pts='';
      points.forEach(function(p){
        var psx=clampS(sx(p.z)), psy=clampS(sy(p.x));
        screenPts.push({sx:psx,sy:psy,p:p,code:-1});
        pts+='<circle cx="'+psx.toFixed(1)+'" cy="'+psy.toFixed(1)+'" r="4.2" fill="'+col+'" stroke="rgba(0,0,0,.4)" stroke-width="0.8" opacity="0.92"/>';
      });
      setSvg('<svg viewBox="0 0 '+S+' '+S+'" xmlns="http://www.w3.org/2000/svg">'+g+pts+'</svg>');
      legendEl.innerHTML='<span class="it"><span class="sw" style="background:'+col+'"></span>'+DIMLABEL[dim]+' ('+points.length+')</span>';
      noteEl.textContent=DIMLABEL[dim]+' — auto-framed to the points (no regions here; regions are an Overworld concept). Axis: X vertical (+X top), Z horizontal (+Z right).';
    }

    function updateDimBtns(){ dimsEl.querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-d')===curDim); }); }

    function render(data){
      lastData=data;
      hideDetail();
      var all=(data&&data.points)||[];
      var points=all.filter(function(p){ return pdim(p)===curDim; });
      countEl.textContent=fmt(points.length);
      updatedEl.textContent='Updated '+new Date().toLocaleTimeString('en-US');
      if(!points.length){ emptyEl.textContent='No RTP points in the '+DIMLABEL[curDim]+' yet.'; }
      emptyEl.style.display=points.length?'none':'flex';
      updateDimBtns();
      tilesBtn.style.display=(curDim==='overworld')?'inline-flex':'none';
      tilesBtn.classList.toggle('on', showTiles);
      if(curDim==='overworld') drawOverworld(points); else drawPlain(points, curDim);
      if(typeof mapBig!=='undefined' && mapBig && mapBig.classList.contains('open')){ var _s=mapwrap.querySelector('svg'); if(_s) mapBigWrap.innerHTML=_s.outerHTML; }
      if(typeof updateCoordFind==='function') updateCoordFind();
    }

    dimsEl.querySelectorAll('button').forEach(function(b){ b.onclick=function(){ curDim=b.getAttribute('data-d'); saveDim(curDim); if(lastData) render(lastData); else load(); }; });

    tilesBtn.addEventListener('click', function(){ showTiles=!showTiles; try{ localStorage.setItem('rtpTiles', showTiles?'1':'0'); }catch(e){} if(lastData) render(lastData); else load(); });

    function hideDetail(){ [detail, (typeof mapBigDetail!=='undefined'?mapBigDetail:null)].forEach(function(x){ if(x) x.classList.remove('show'); }); }
    function nearestOther(p){
      var best=null,bd=Infinity;
      for(var i=0;i<screenPts.length;i++){ var q=screenPts[i].p; if(q===p) continue; var dx=q.x-p.x, dz=q.z-p.z; var dd=Math.sqrt(dx*dx+dz*dz); if(dd<bd){ bd=dd; best=q; } }
      return best?{dist:bd,q:best}:null;
    }
    function bindMap(wrap, tip, detail, outer){
      function pointAt(e){
        if(!screenPts.length) return null;
        var rect=wrap.getBoundingClientRect();
        var mx=(e.clientX-rect.left)/rect.width*S, my=(e.clientY-rect.top)/rect.height*S;
        var best=null,bd=1e9;
        for(var i=0;i<screenPts.length;i++){ var dx=screenPts[i].sx-mx, dy=screenPts[i].sy-my, dd=dx*dx+dy*dy; if(dd<bd){ bd=dd; best=screenPts[i]; } }
        var tsvg=16*S/rect.width;
        return (best && bd<=tsvg*tsvg)?best:null;
      }
      wrap.addEventListener('mousemove', function(e){
        if(!screenPts.length){ tip.style.opacity=0; return; }
        var rect=wrap.getBoundingClientRect();
        var mx=(e.clientX-rect.left)/rect.width*S, my=(e.clientY-rect.top)/rect.height*S;
        var best=null,bd=1e9;
        for(var i=0;i<screenPts.length;i++){ var dx=screenPts[i].sx-mx, dy=screenPts[i].sy-my, dd=dx*dx+dy*dy; if(dd<bd){bd=dd;best=screenPts[i];} }
        var tsvg=16*S/rect.width;
        if(best && bd<=tsvg*tsvg){
          var p=best.p; var rline='';
          if(best.code>=0){ var rg=REGIONS[best.code]; rline='<span class="rg" style="color:'+rg.color+'">'+rg.name+'</span> · '; }
          tip.innerHTML='<b>'+(p.n||'?')+'</b><br>'+p.x+', '+p.z+'<br>'+rline+ago(p.t);
          tip.style.left=(wrap.offsetLeft+best.sx/S*rect.width)+'px';
          tip.style.top=(wrap.offsetTop+best.sy/S*rect.height)+'px';
          tip.style.transform=(best.sy>150?'translate(-50%,-130%)':'translate(-50%,30%)');
          tip.style.opacity=1;
        } else { tip.style.opacity=0; }
      });
      wrap.addEventListener('mouseleave', function(){ tip.style.opacity=0; });
      wrap.addEventListener('click', function(e){
        var best=pointAt(e);
        if(!best){ hideDetail(); return; }
        var p=best.p, rline='';
        if(best.code>=0){ var rg=REGIONS[best.code]; rline='<span class="rg" style="color:'+rg.color+'">'+rg.name+'</span> · '; }
        var near=nearestOther(p);
        var nline=near?('Nearest point: <b>'+fmt(near.dist)+'</b> blocks'+(near.q.n?' ('+near.q.n+')':'')):'No other point in this dimension.';
        detail.innerHTML='<button class="dclose">×</button><b>'+(p.n||'?')+'</b><br>'+p.x+', '+p.z+'<br>'+rline+ago(p.t)+'<div class="dsep"></div><div class="dnear">'+nline+'</div>';
        detail.classList.add('show');
        var px=wrap.offsetLeft+best.sx/S*wrap.clientWidth;
        var py=wrap.offsetTop+best.sy/S*wrap.clientHeight;
        var ow=outer.clientWidth, dw=detail.offsetWidth, dh=detail.offsetHeight;
        var lx=Math.max(dw/2+2, Math.min(ow-dw/2-2, px));
        var above=(py-dh-12)>0;
        detail.style.left=lx+'px';
        detail.style.top=(above?py-12:py+12)+'px';
        detail.style.transform='translate(-50%,'+(above?'-100%':'0')+')';
        var cb=detail.querySelector('.dclose');
        if(cb) cb.addEventListener('click', function(ev){ ev.stopPropagation(); hideDetail(); });
      });
    }
    bindMap(mapwrap, tip, detail, mapouter);

    function load(){
      fetch('/api/rtp?_='+Date.now(),{cache:'no-store'})
        .then(function(r){ return r.json(); })
        .then(render)
        .catch(function(){ emptyEl.textContent='Could not load the map.'; emptyEl.style.display='flex'; });
    }
    refreshBtn.addEventListener('click', load);
    var mapBig=document.getElementById('mapBig'), mapBigWrap=document.getElementById('mapBigWrap'), mapBigSub=document.getElementById('mapBigSub');
    var mapBigTip=document.getElementById('mapBigTip'), mapBigDetail=document.getElementById('mapBigDetail'), mapBigOuter=document.getElementById('mapBigOuter');
    bindMap(mapBigWrap, mapBigTip, mapBigDetail, mapBigOuter);

    var cfX=document.getElementById('cfX'), cfZ=document.getElementById('cfZ'), cfBtn=document.getElementById('cfBtn'), cfOut=document.getElementById('cfOut');
    function nearestToXZ(x,z){
      var best=null,bd=Infinity;
      for(var i=0;i<screenPts.length;i++){ var q=screenPts[i].p; var dx=q.x-x, dz=q.z-z; var dd=Math.sqrt(dx*dx+dz*dz); if(dd<bd){ bd=dd; best=q; } }
      return best?{dist:bd,q:best}:null;
    }
    function updateCoordFind(){
      if(!cfOut) return;
      var xv=cfX.value.trim(), zv=cfZ.value.trim();
      if(xv===''||zv===''){ cfOut.textContent=''; return; }
      var x=Number(xv), z=Number(zv);
      if(!isFinite(x)||!isFinite(z)){ cfOut.textContent=''; return; }
      if(!screenPts.length){ cfOut.innerHTML='<span class="cf-muted">No RTP points in the '+DIMLABEL[curDim]+' yet.</span>'; return; }
      var n=nearestToXZ(x,z);
      cfOut.innerHTML='Nearest '+DIMLABEL[curDim]+' point: <b>'+fmt(n.dist)+'</b> blocks — '+(n.q.n?n.q.n+' ':'')+'at '+n.q.x+', '+n.q.z;
    }
    cfX.addEventListener('input', updateCoordFind);
    cfZ.addEventListener('input', updateCoordFind);
    cfBtn.addEventListener('click', updateCoordFind);
    function openBig(){ var svg=mapwrap.querySelector('svg'); mapBigWrap.innerHTML = svg ? svg.outerHTML : ''; mapBigSub.textContent = DIMLABEL[curDim]+' · '+countEl.textContent+' points'; mapBig.classList.add('open'); }
    function closeBig(){ mapBig.classList.remove('open'); }
    document.getElementById('mapEnlarge').addEventListener('click', openBig);
    document.getElementById('mapBigX').addEventListener('click', closeBig);
    mapBig.addEventListener('click', function(e){ if(e.target===mapBig) closeBig(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeBig(); });
    updateDimBtns();
    load();
    setInterval(load, 30000);
  })();
  </script>
  <script>document.querySelectorAll('.btn').forEach(function(b){b.addEventListener('click',function(){b.classList.add('flash');});b.addEventListener('animationend',function(){b.classList.remove('flash');});});</script>
</body>
</html>
