<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Player Stats</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/theme.css" />
<style>

  .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:28px 22px 60px}
  .back{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 16px;color:var(--muted);font-weight:600;font-size:14px;margin-bottom:22px;transition:.2s}
  .back:hover{color:var(--text);border-color:var(--accent);background:var(--card-2)}
  h1{font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-1px;filter:drop-shadow(0 0 22px rgba(255,255,255,.13))}
  h1 .grad{background:linear-gradient(105deg,#ffffff 0%,#d7dae6 28%,#9197b0 50%,#d7dae6 72%,#ffffff 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 5s ease-in-out infinite alternate}
  .sub{color:var(--muted);font-size:15px;margin-top:8px}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:26px 0 14px}
  .search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;outline:none}
  .search:focus{border-color:var(--accent)}
  .btn{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#0a0a0c;border:none;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .msg{color:var(--muted);font-size:14px;padding:30px 0;text-align:center}
  .err{color:#ff6b6b}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}
  .phead{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(184,188,204,.05));border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:18px}
  .phead img{width:64px;height:64px;border-radius:12px;image-rendering:pixelated;background:var(--card-2)}
  .phead .nm{font-size:24px;font-weight:800}
  .phead .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
  .stat .lbl{color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
  .stat .val{font-size:24px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .val.money{color:var(--green)}
  .stat .sub2{color:var(--muted);font-size:12px;margin-top:2px}
  .apidown{display:none;align-items:center;gap:10px;background:rgba(255,80,80,.10);border:1px solid rgba(255,120,120,.38);color:#ffb3b3;border-radius:12px;padding:12px 16px;margin:16px 0 0;font-size:14px;font-weight:600}
  .apidown .dot{width:8px;height:8px;border-radius:50%;background:#ff6b6b;box-shadow:0 0 10px #ff6b6b;flex-shrink:0}
  .apidown.show{display:flex}
  .apidown small{font-weight:500;color:#e89a9a;display:block;margin-top:2px}
  .saved{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 0;max-height:104px;overflow-y:auto;padding-right:2px}
  #out{margin-top:18px}
  .saved:empty{display:none}
  .saved-lbl{width:100%;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#8b8ba0;font-weight:700;margin-bottom:2px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:#1a1a28;border:1px solid rgba(255,255,255,.12);color:#f3f3f7;border-radius:999px;padding:7px 6px 7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.16s}
  .chip:hover{border-color:rgba(255,255,255,.4);background:#22222e}
  .chip{cursor:grab}
  .chip:active{cursor:grabbing}
  .chip.dragging{opacity:.4}
  .drop-line{align-self:stretch;width:3px;min-height:30px;background:#fff;border-radius:2px;box-shadow:0 0 9px rgba(255,255,255,.75);margin:0 -3px;pointer-events:none}
  .chip .rm{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.06);color:#8b8ba0;font-size:13px;line-height:1}
  .chip .rm:hover{background:rgba(255,90,90,.22);color:#ff9b9b}
  .btn.ghost{background:#1a1a28;color:#f3f3f7;border:1px solid rgba(255,255,255,.14)}
  .btn.ghost:hover{background:#22222e}
  @keyframes btnflash{from{box-shadow:0 0 0 0 rgba(255,255,255,.55)}to{box-shadow:0 0 0 9px rgba(255,255,255,0)}}
  .btn.flash{animation:btnflash .5s ease-out}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <a class="back" href="index.html">← Dashboard</a>
    <h1><svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px"><rect x="5" y="18" width="5.5" height="9" rx="1.6" fill="#5bd99a"/><rect x="13.2" y="12" width="5.5" height="15" rx="1.6" fill="#6ba8ff"/><rect x="21.5" y="6.5" width="5.5" height="20.5" rx="1.6" fill="#ff7eb6"/></svg><span class="grad">Player Stats</span></h1>
    <p class="sub">Search a DonutSMP player to see their money, shards, K/D, playtime and more.</p>
    <div class="apidown" id="apiDown"><span class="dot"></span><span>DonutSMP API currently unavailable &mdash; data cannot load right now. <small>This is on the DonutSMP side, not the site. Please try again shortly.</small></span></div>
    <div class="toolbar">
      <input class="search" id="name" placeholder="Player name… (e.g. Ikeacpvp)" />
      <button class="btn" id="go">Search</button>
      <button class="btn ghost" id="refresh">Refresh</button>
      <button class="btn ghost" id="save">Save</button>
    </div>
    <div class="saved" id="saved"></div>
    <div id="out"></div>
  </div>
  <script>
    const API='/api/player';
    const nameEl=document.getElementById('name'), goEl=document.getElementById('go'), out=document.getElementById('out'), refreshEl=document.getElementById('refresh');
    const de=n=>Math.round(n).toLocaleString('de-DE');
    function abbr(n){ const a=Math.abs(n); if(a>=1e12)return (n/1e12).toFixed(2)+'T'; if(a>=1e9)return (n/1e9).toFixed(2)+'B'; if(a>=1e6)return (n/1e6).toFixed(2)+'M'; if(a>=1e3)return (n/1e3).toFixed(2)+'k'; return Math.round(n).toString(); }
    function playtime(ms){ const s=Math.floor(ms/1000); const d=Math.floor(s/86400); const h=Math.floor((s%86400)/3600); const m=Math.floor((s%3600)/60); if(d>0)return d+'d '+h+'h'; if(h>0)return h+'h '+m+'m'; return m+'m'; }
    function card(lbl,val,sub,cls){ return '<div class="stat"><div class="lbl">'+lbl+'</div><div class="val '+(cls||'')+'">'+val+'</div>'+(sub?'<div class="sub2">'+sub+'</div>':'')+'</div>'; }
    async function search(force){
      const name=nameEl.value.trim(); if(!name) return;
      const busyBtn=force?refreshEl:goEl;
      out.innerHTML='<div class="msg"><div class="spinner"></div>Loading stats…</div>'; busyBtn.disabled=true;
      try{
        const r=await fetch(API+'?name='+encodeURIComponent(name)+(force?'&_='+Date.now():'')); const j=await r.json();
        const s=j.stats;
        if(j.statsStatus&&j.statsStatus>=500){ out.innerHTML='<div class="msg err"><b>DonutSMP API unavailable</b><br><small>The DonutSMP server API is down right now (not the site). Try again shortly.</small></div>'; return; }
        if(!s || s.money===undefined){ out.innerHTML='<div class="msg err">Player "'+name+'" not found, or no data.</div>'; return; }
        const money=+s.money, shards=+s.shards, kills=+s.kills, deaths=+s.deaths;
        const kd= deaths>0 ? (kills/deaths).toFixed(2) : String(kills);
        const lk=j.lookup||{};
        const online = (lk.location) ? ('Online · '+lk.location) : ((lk.username||lk.rank) ? 'Online' : 'Offline');
        let h='<div class="phead"><img src="https://minotar.net/helm/'+encodeURIComponent(name)+'/64.png" alt=""><div><div class="nm">'+name+'</div><div class="meta">'+online+' · updated '+new Date().toLocaleTimeString('de-DE')+'</div></div></div>';
        h+='<div class="grid">';
        h+=card('Money', abbr(money), de(money)+' $', 'money');
        h+=card('Shards', de(shards));
        h+=card('Kills', de(kills));
        h+=card('Deaths', de(deaths));
        h+=card('K/D', kd);
        h+=card('Playtime', playtime(+s.playtime));
        h+=card('Blocks mined', de(+s.broken_blocks));
        h+=card('Blocks placed', de(+s.placed_blocks));
        h+=card('Mobs killed', de(+s.mobs_killed));
        h+=card('Spent in shop', abbr(+s.money_spent_on_shop), de(+s.money_spent_on_shop)+' $');
        h+=card('Earned via /sell', abbr(+s.money_made_from_sell), de(+s.money_made_from_sell)+' $');
        h+='</div>';
        out.innerHTML=h;
      }catch(e){ out.innerHTML='<div class="msg err">Error loading: '+e.message+'</div>'; }
      finally{ busyBtn.disabled=false; }
    }
    goEl.addEventListener('click',()=>search(false));
    document.getElementById('refresh').addEventListener('click',()=>search(true));
    nameEl.addEventListener('keydown',e=>{ if(e.key==='Enter') search(); });
    fetch('/api/player?ping=1').then(function(r){return r.json();}).then(function(j){if(j&&j.up===false)document.getElementById('apiDown').classList.add('show');}).catch(function(){});
    (function(){
      var KEY='donutSavedPlayers';
      var box=document.getElementById('saved');
      var saveBtn=document.getElementById('save');
      function load(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
      function store(a){ try{ localStorage.setItem(KEY, JSON.stringify(a)); }catch(e){} }
      function render(){
        var a=load();
        if(!a.length){ box.innerHTML=''; return; }
        var h='<div class="saved-lbl">Saved players</div>';
        a.forEach(function(n){ h+='<span class="chip" draggable="true" data-n="'+n+'"><span class="nm">'+n+'</span><span class="rm" data-rm="'+n+'" title="Remove">&times;</span></span>'; });
        box.innerHTML=h;
        box.querySelectorAll('.chip').forEach(function(c){ c.addEventListener('click',function(e){ if(e.target.classList.contains('rm')) return; nameEl.value=c.getAttribute('data-n'); search(); }); });
        box.querySelectorAll('.rm').forEach(function(r){ r.addEventListener('click',function(e){ e.stopPropagation(); var n=r.getAttribute('data-rm'); store(load().filter(function(x){return x!==n;})); render(); }); });
        box.querySelectorAll('.chip').forEach(function(c){
          c.addEventListener('dragstart',function(e){ dragSrc=c.getAttribute('data-n'); c.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',dragSrc);}catch(_){} });
          c.addEventListener('dragend',function(){ c.classList.remove('dragging'); if(line.parentNode) line.parentNode.removeChild(line); dragSrc=null; });
        });
      }
      if(saveBtn){ saveBtn.addEventListener('click',function(){ var n=nameEl.value.trim(); if(!n) return; var a=load(); if(a.map(function(x){return x.toLowerCase();}).indexOf(n.toLowerCase())<0){ a.push(n); store(a); } render(); }); }
      var dragSrc=null;
      var line=document.createElement('span'); line.className='drop-line';
      function chipAfter(x){ var cs=[].slice.call(box.querySelectorAll('.chip:not(.dragging)')); for(var i=0;i<cs.length;i++){ var r=cs[i].getBoundingClientRect(); if(x < r.left + r.width/2) return cs[i]; } return null; }
      box.addEventListener('dragover',function(e){ if(!dragSrc) return; e.preventDefault(); e.dataTransfer.dropEffect='move'; var after=chipAfter(e.clientX); if(after) box.insertBefore(line, after); else box.appendChild(line); });
      box.addEventListener('drop',function(e){ if(!dragSrc) return; e.preventDefault(); var bf=line.nextElementSibling; while(bf && !bf.classList.contains('chip')) bf=bf.nextElementSibling; var beforeName=bf?bf.getAttribute('data-n'):null; if(line.parentNode) line.parentNode.removeChild(line); var a=load(); var from=a.indexOf(dragSrc); if(from<0) return; a.splice(from,1); var idx=beforeName?a.indexOf(beforeName):a.length; if(idx<0) idx=a.length; a.splice(idx,0,dragSrc); store(a); dragSrc=null; render(); });
      render();
    })();
  </script>
  <script>document.querySelectorAll('.btn').forEach(function(b){b.addEventListener('click',function(){b.classList.add('flash');});b.addEventListener('animationend',function(){b.classList.remove('flash');});});</script>
</body>
</html>
